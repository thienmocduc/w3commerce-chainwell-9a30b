# ─────────────────────────────────────────────────────────────────────────────
# WellKOC — Production Nginx Virtual Host Configuration
# Domain:  wellkoc.com
# Updated: 2026-03-31
# ─────────────────────────────────────────────────────────────────────────────

# ── Rate-limit zones (defined at http context; include from nginx.conf) ───────
# These zones must be declared before the server blocks.
# If this file is included inside an existing http{} block they are already
# available.  Duplicate declarations are safe in nginx ≥ 1.18 (last-wins).

limit_req_zone $binary_remote_addr zone=wk_api:10m  rate=100r/m;
limit_req_zone $binary_remote_addr zone=wk_auth:10m rate=10r/s;

# ── Upstream — FastAPI backend ────────────────────────────────────────────────
upstream wellkoc_backend {
    server 127.0.0.1:8000 max_fails=3 fail_timeout=30s;
    keepalive 64;
}

# ─────────────────────────────────────────────────────────────────────────────
# SERVER BLOCK 1: HTTP → HTTPS redirect (port 80)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen      80;
    listen      [::]:80;
    server_name wellkoc.com www.wellkoc.com;

    # ACME challenge passthrough (Let's Encrypt / Certbot)
    location /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        try_files $uri =404;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }

    access_log /var/log/nginx/wellkoc_http_access.log;
    error_log  /var/log/nginx/wellkoc_http_error.log  warn;
}

# ─────────────────────────────────────────────────────────────────────────────
# SERVER BLOCK 2: HTTPS — primary host (port 443)
# ─────────────────────────────────────────────────────────────────────────────
server {
    listen      443 ssl;
    listen      [::]:443 ssl;
    http2       on;
    server_name wellkoc.com www.wellkoc.com;

    # ── SSL / TLS ─────────────────────────────────────────────────────────────
    ssl_certificate     /etc/ssl/wellkoc/fullchain.pem;
    ssl_certificate_key /etc/ssl/wellkoc/privkey.pem;

    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # OCSP stapling
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout    5s;

    # ── Timeouts & sizes ─────────────────────────────────────────────────────
    client_max_body_size    50M;
    client_body_timeout     60s;
    client_header_timeout   15s;
    send_timeout            60s;
    keepalive_timeout       75s;

    # ── Gzip compression ─────────────────────────────────────────────────────
    gzip              on;
    gzip_vary         on;
    gzip_proxied      any;
    gzip_comp_level   5;
    gzip_min_length   1024;
    gzip_buffers      16 8k;
    gzip_http_version 1.1;
    gzip_types
        text/plain
        text/css
        text/javascript
        text/xml
        application/json
        application/javascript
        application/x-javascript
        application/xml
        application/xml+rss
        application/atom+xml
        application/ld+json
        image/svg+xml
        font/woff
        font/woff2;

    # ── Security headers ─────────────────────────────────────────────────────
    add_header X-Frame-Options           "SAMEORIGIN"                                        always;
    add_header X-Content-Type-Options    "nosniff"                                           always;
    add_header X-XSS-Protection          "1; mode=block"                                     always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin"                   always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()"          always;

    # HSTS — 1 year, include subdomains, preload
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload"      always;

    # Content Security Policy
    add_header Content-Security-Policy
        "default-src 'self'; \
         script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net; \
         style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; \
         font-src 'self' https://fonts.gstatic.com data:; \
         img-src 'self' data: blob: https:; \
         connect-src 'self' wss://wellkoc.com https://api.wellkoc.com; \
         frame-ancestors 'none'; \
         base-uri 'self'; \
         form-action 'self';"  always;

    # ── Logging ───────────────────────────────────────────────────────────────
    access_log /var/log/nginx/wellkoc_access.log  main buffer=32k flush=5s;
    error_log  /var/log/nginx/wellkoc_error.log   warn;

    # ── Frontend: React SPA (served from /var/www/wellkoc/dist) ──────────────
    root  /var/www/wellkoc/dist;
    index index.html;

    # Static assets — long-lived cache
    location ~* \.(js|css|mjs|cjs|woff|woff2|ttf|eot|svg|ico|png|jpg|jpeg|gif|webp|avif|mp4|webm)$ {
        expires     1y;
        add_header  Cache-Control "public, immutable";
        access_log  off;
        try_files   $uri =404;
    }

    # SPA fallback — all non-asset, non-API routes go to index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API proxy: /api/v1/ ───────────────────────────────────────────
    # Auth endpoints — strict rate limit (10 req/s, burst of 20)
    location ~* ^/api/v1/auth/ {
        limit_req zone=wk_auth burst=20 nodelay;
        limit_req_status 429;

        proxy_pass         http://wellkoc_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        proxy_buffering    on;
        proxy_buffer_size  4k;
        proxy_buffers      8 4k;
    }

    # General API endpoints — 100 req/min, burst of 50
    location /api/v1/ {
        limit_req zone=wk_api burst=50 nodelay;
        limit_req_status 429;

        proxy_pass         http://wellkoc_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";

        proxy_connect_timeout 10s;
        proxy_read_timeout    60s;
        proxy_send_timeout    60s;

        proxy_buffering       on;
        proxy_buffer_size     8k;
        proxy_buffers         16 8k;
        proxy_busy_buffers_size 32k;

        # Large upload support (file uploads to API)
        client_max_body_size 50M;
    }

    # ── WebSocket proxy: /ws ──────────────────────────────────────────────────
    location /ws {
        proxy_pass         http://wellkoc_backend;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host       $host;
        proxy_set_header   X-Real-IP  $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;

        proxy_read_timeout  86400s;   # 24 h — keep WS connections open
        proxy_send_timeout  86400s;
        proxy_connect_timeout 10s;

        # Do not buffer WebSocket frames
        proxy_buffering off;
    }

    # ── Backend health-check (internal use / load balancer probes) ───────────
    location /health {
        proxy_pass         http://wellkoc_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        access_log         off;
    }

    # ── Block hidden files (.env, .git, etc.) ────────────────────────────────
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    # ── robots.txt / favicon.ico — no 404 logs ───────────────────────────────
    location = /robots.txt  { access_log off; log_not_found off; }
    location = /favicon.ico { access_log off; log_not_found off; }
}
