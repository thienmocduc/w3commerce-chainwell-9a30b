[build]
  base = "frontend"
  command = "npm install && npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "20"
  VITE_API_URL = "https://wellkoc-api.onrender.com/api/v1"
  VITE_WS_URL = "wss://wellkoc-api.onrender.com/ws"

[dev]
  framework = "#static"

# SPA routing - all routes go to index.html
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
