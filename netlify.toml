[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
  NEXT_TELEMETRY_DISABLED = "1"

# Placeholder env vars so build doesn't crash during static generation
# Override these in Netlify dashboard → Site settings → Environment variables
  NEXT_PUBLIC_SUPABASE_URL = "https://placeholder.supabase.co"
  NEXT_PUBLIC_SUPABASE_ANON_KEY = "placeholder"
  NEXT_PUBLIC_WC_PROJECT_ID = "placeholder"
  NEXT_PUBLIC_CONTRACT_NETWORK = "mumbai"
